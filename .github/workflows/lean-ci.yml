name: Lean CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lean-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build Lean project
        uses: leanprover/lean-action@v1
        with:
          build: true
          build-args: --wfail
          test: false
          lint: false
          use-mathlib-cache: true

      - name: Require clean Lean diagnostics
        shell: bash
        run: |
          output="$(lake build 2>&1)"
          printf '%s\n' "$output"
          if grep -Eq '^(warning|info):' <<< "$output"; then
            echo 'Lean emitted a warning or informational suggestion.'
            exit 1
          fi
